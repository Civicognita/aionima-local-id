<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
  <h1>Connected Services</h1>
  <div style="color: var(--text-muted); font-size: 0.9rem;">
    {{user_email}} &nbsp;|&nbsp;
    <a href="#" onclick="logout()" style="color: var(--accent); text-decoration: none;">Log out</a>
  </div>
</div>

<div class="card">
  <table>
    <thead>
      <tr>
        <th>Service</th>
        <th>Account</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      {{service_rows}}
    </tbody>
  </table>
</div>

<!-- Device Flow Modal -->
<div id="device-flow-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:1000;">
  <div style="max-width:420px;margin:15vh auto;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem;">
    <h3 style="margin:0 0 0.5rem 0;">Connect GitHub</h3>
    <p style="font-size:0.9rem;color:var(--text-muted);margin-bottom:1.5rem;">
      Visit the URL below and enter the code to authorize.
    </p>
    <div style="margin-bottom:1rem;">
      <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.3rem;">Visit this URL:</div>
      <a id="df-url" href="#" target="_blank" style="font-size:0.95rem;color:var(--accent);font-family:monospace;"></a>
    </div>
    <div style="margin-bottom:1.5rem;">
      <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.3rem;">Enter this code:</div>
      <div style="display:flex;gap:0.75rem;align-items:center;">
        <span id="df-code" style="font-size:1.5rem;font-weight:700;letter-spacing:0.2em;font-family:monospace;color:var(--text);"></span>
        <button class="btn btn-sm btn-secondary" onclick="copyCode()">Copy</button>
      </div>
    </div>
    <div id="df-status" style="font-size:0.85rem;color:var(--text-muted);">
      <span style="animation:pulse 1.5s infinite;">&#9679;</span> Waiting for authorization...
    </div>
    <div id="df-error" style="display:none;font-size:0.85rem;color:var(--danger);margin-top:0.5rem;"></div>
    <div style="margin-top:1.5rem;display:flex;gap:0.5rem;">
      <button class="btn btn-sm btn-secondary" onclick="cancelDeviceFlow()">Cancel</button>
    </div>
  </div>
</div>

<style>
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>

<script>
  var HIVE_ID_URL = "{{hive_id_url}}";

  function getCsrfToken() {
    var match = document.cookie.match(/(?:^|;\s*)aionima_csrf=([^;]*)/);
    return match ? match[1] : "";
  }

  function logout() {
    fetch("/auth/logout", {
      method: "POST",
      credentials: "same-origin",
      headers: { "X-CSRF-Token": getCsrfToken() }
    }).then(function() {
      window.location.href = "/auth/login";
    });
  }

  // Handle disconnect form submissions via fetch with CSRF
  document.querySelectorAll("form[action*='/delete']").forEach(function(form) {
    form.addEventListener("submit", function(e) {
      e.preventDefault();
      var action = form.getAttribute("action");
      // Strip /delete suffix to get the connection ID endpoint
      var deleteUrl = action.replace("/delete", "");
      fetch(deleteUrl, {
        method: "DELETE",
        credentials: "same-origin",
        headers: { "X-CSRF-Token": getCsrfToken() }
      }).then(function(res) {
        if (res.ok) {
          window.location.reload();
        } else {
          res.json().then(function(data) {
            alert(data.error || "Failed to disconnect");
          });
        }
      });
    });
  });

  // ---------------------------------------------------------------------------
  // GitHub Device Flow
  // ---------------------------------------------------------------------------

  var dfPoller = null;
  var dfDeviceCode = null;

  function startGithubDeviceFlow(role) {
    var modal = document.getElementById("device-flow-modal");
    var statusEl = document.getElementById("df-status");
    var errorEl = document.getElementById("df-error");

    modal.style.display = "block";
    statusEl.style.display = "block";
    errorEl.style.display = "none";
    statusEl.innerHTML = "Starting...";

    fetch("/api/auth/device-flow/start", {
      method: "POST",
      credentials: "same-origin",
      headers: { "Content-Type": "application/json", "X-CSRF-Token": getCsrfToken() },
      body: JSON.stringify({ provider: "github", role: role || "owner" })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.error) {
        errorEl.textContent = data.error;
        errorEl.style.display = "block";
        statusEl.style.display = "none";
        return;
      }

      document.getElementById("df-url").textContent = data.verificationUri;
      document.getElementById("df-url").href = data.verificationUri;
      document.getElementById("df-code").textContent = data.userCode;
      dfDeviceCode = data.deviceCode;
      statusEl.textContent = "● Waiting for authorization...";

      // Poll at the server-advised cadence (ref-held setTimeout, not
      // setInterval). GitHub responds "slow_down" whenever polls arrive
      // faster than its current rate — each slow_down bumps the server's
      // stored interval. A hard-coded 3s timer silently buried us in
      // slow_down loops forever, so the flow stalled at "waiting for
      // authorization" even after the user granted on github.com.
      function scheduleNextPoll(delaySec) {
        var delay = Math.max(1, delaySec | 0) * 1000;
        dfPoller = setTimeout(function() {
          fetch("/api/auth/device-flow/poll?deviceCode=" + encodeURIComponent(dfDeviceCode), {
            credentials: "same-origin"
          })
          .then(function(res) { return res.json(); })
          .then(function(result) {
            if (result.status === "completed") {
              dfPoller = null;
              // Use textContent to avoid injecting result.accountLabel as HTML.
              statusEl.textContent = "✓ Connected as " + (result.accountLabel || "GitHub") + ". Refreshing...";
              statusEl.style.color = "var(--success)";
              setTimeout(function() {
                modal.style.display = "none";
                window.location.reload();
              }, 1500);
              return;
            }
            if (result.status === "expired" || result.status === "error") {
              dfPoller = null;
              errorEl.textContent = result.error || "Authorization expired. Please try again.";
              errorEl.style.display = "block";
              statusEl.style.display = "none";
              return;
            }
            // Still pending — reschedule using the interval the server
            // told us (or fall back to 5s, GitHub's minimum).
            scheduleNextPoll(result.interval || 5);
          })
          .catch(function() {
            // Network blip — retry in a moment, don't give up
            scheduleNextPoll(5);
          });
        }, delay);
      }
      scheduleNextPoll(data.interval || 5);
    })
    .catch(function(err) {
      errorEl.textContent = "Network error: " + err.message;
      errorEl.style.display = "block";
      statusEl.style.display = "none";
    });
  }

  function copyCode() {
    var code = document.getElementById("df-code").textContent;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(code);
    }
  }

  function cancelDeviceFlow() {
    // Ref holds a setTimeout handle now (switched from setInterval so the
    // loop can honor GitHub's slow_down cadence).
    if (dfPoller) { clearTimeout(dfPoller); dfPoller = null; }
    document.getElementById("device-flow-modal").style.display = "none";
  }
</script>
