<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{title}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface2: #0f3460;
      --accent: #e94560;
      --accent2: #533483;
      --text: #e0e0e0;
      --text-muted: #888;
      --border: #2a2a4a;
      --success: #4caf50;
      --danger: #f44336;
      --warning: #ff9800;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    header .logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--accent);
      text-decoration: none;
    }

    header .logo span {
      color: var(--text);
    }

    main {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
    }

    h1 { font-size: 1.75rem; margin-bottom: 1.5rem; }
    h2 { font-size: 1.25rem; margin-bottom: 1rem; color: var(--text-muted); font-weight: 500; }

    .btn {
      display: inline-block;
      padding: 0.5rem 1.25rem;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-secondary { background: var(--surface2); color: var(--text); }
    .btn-danger { background: var(--danger); color: white; }
    .btn-sm { padding: 0.3rem 0.75rem; font-size: 0.8rem; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge-connected { background: rgba(76, 175, 80, 0.2); color: var(--success); }
    .badge-disconnected { background: rgba(136, 136, 136, 0.2); color: var(--text-muted); }
    .badge-owner { background: rgba(83, 52, 131, 0.4); color: #b39ddb; }
    .badge-agent { background: rgba(233, 69, 96, 0.2); color: var(--accent); }

    .form-group { margin-bottom: 1.25rem; }
    .form-group label { display: block; margin-bottom: 0.4rem; font-size: 0.9rem; color: var(--text-muted); }
    .form-group input {
      width: 100%;
      padding: 0.6rem 0.9rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 1rem;
    }
    .form-group input:focus { outline: none; border-color: var(--accent); }

    .error-msg {
      background: rgba(244, 67, 54, 0.15);
      border: 1px solid rgba(244, 67, 54, 0.4);
      color: #ef9a9a;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      display: none;
    }

    table { width: 100%; border-collapse: collapse; }
    table th {
      text-align: left;
      padding: 0.75rem 1rem;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
    }
    table td {
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    table tr:last-child td { border-bottom: none; }
  </style>
</head>
<body>
  <header>
    <a href="/dashboard" class="logo">Aionima<span> ID</span></a>
    <nav style="display: flex; gap: 1.25rem; margin-left: 1.5rem;">
      <a href="/dashboard" style="color: var(--text-muted); font-size: 0.9rem; text-decoration: none;">Connections</a>
      <a href="/channels" style="color: var(--text-muted); font-size: 0.9rem; text-decoration: none;">Channels</a>
      <a href="/settings/providers" style="color: var(--text-muted); font-size: 0.9rem; text-decoration: none;">Settings</a>
    </nav>
  </header>
  <main>
    {{content}}
  </main>
  <div class="agi-version-badge" title="Aionima ID service version">
    ID v{{version}}
  </div>
  <style>
    .agi-version-badge {
      position: fixed;
      right: 10px;
      bottom: 10px;
      padding: 4px 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      line-height: 1;
      color: var(--text-muted);
      background: rgba(22, 33, 62, 0.85);
      border: 1px solid var(--border);
      border-radius: 999px;
      backdrop-filter: blur(4px);
      z-index: 10000;
      user-select: all;
      pointer-events: auto;
      opacity: 0.6;
      transition: opacity 120ms;
    }
    .agi-version-badge:hover { opacity: 1; }
  </style>
</body>
</html>
