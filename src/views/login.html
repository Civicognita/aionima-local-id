<div class="card" style="max-width: 420px; margin: 0 auto;">
  <h1>Aionima ID</h1>

  <div class="tabs" style="display:flex; gap: 0.5rem; margin-bottom: 1.5rem;">
    <button class="btn btn-primary tab-btn" id="tab-login" onclick="switchTab('login')">Log in</button>
    <button class="btn btn-secondary tab-btn" id="tab-register" onclick="switchTab('register')">Register</button>
  </div>

  <div id="error-msg" class="error-msg"></div>

  <form id="form-login">
    <div class="form-group">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" name="email" required autocomplete="email" />
    </div>
    <div class="form-group">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" name="password" required autocomplete="current-password" />
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;">Log in</button>
  </form>

  <form id="form-register" style="display:none;">
    <div class="form-group">
      <label for="reg-email">Email</label>
      <input type="email" id="reg-email" name="email" required autocomplete="email" />
    </div>
    <div class="form-group">
      <label for="reg-password">Password</label>
      <input type="password" id="reg-password" name="password" required autocomplete="new-password" minlength="8" />
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;">Create account</button>
  </form>
</div>

<script>
  var HANDOFF_ID = "{{handoff_id}}";

  function getCsrfToken() {
    var match = document.cookie.match(/(?:^|;\s*)aionima_csrf=([^;]*)/);
    return match ? match[1] : "";
  }

  function switchTab(tab) {
    document.getElementById("form-login").style.display = tab === "login" ? "" : "none";
    document.getElementById("form-register").style.display = tab === "register" ? "" : "none";
    document.getElementById("tab-login").className = "btn " + (tab === "login" ? "btn-primary" : "btn-secondary") + " tab-btn";
    document.getElementById("tab-register").className = "btn " + (tab === "register" ? "btn-primary" : "btn-secondary") + " tab-btn";
  }

  function showError(msg) {
    var el = document.getElementById("error-msg");
    el.textContent = msg;
    el.style.display = "block";
  }

  function handleAuth(endpoint, email, password) {
    return fetch(endpoint, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-CSRF-Token": getCsrfToken()
      },
      credentials: "same-origin",
      body: JSON.stringify({ email: email, password: password }),
    })
    .then(function(res) {
      return res.json().then(function(data) {
        if (!res.ok) {
          showError(data.error || "An error occurred");
          return;
        }
        if (HANDOFF_ID) {
          window.location.href = "/api/handoff/" + HANDOFF_ID;
        } else {
          window.location.href = "/dashboard";
        }
      });
    })
    .catch(function() {
      showError("Network error. Please try again.");
    });
  }

  document.getElementById("form-login").addEventListener("submit", function(e) {
    e.preventDefault();
    var email = document.getElementById("login-email").value;
    var password = document.getElementById("login-password").value;
    handleAuth("/auth/login", email, password);
  });

  document.getElementById("form-register").addEventListener("submit", function(e) {
    e.preventDefault();
    var email = document.getElementById("reg-email").value;
    var password = document.getElementById("reg-password").value;
    handleAuth("/auth/register", email, password);
  });
</script>
