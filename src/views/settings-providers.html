<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
  <h1>Provider Settings</h1>
  <a href="/dashboard" style="color: var(--text-muted); font-size: 0.9rem; text-decoration: none;">Back to Connections</a>
</div>

<p style="color: var(--text-muted); margin-bottom: 2rem; font-size: 0.95rem;">
  Configure OAuth credentials for each provider. Credentials are stored encrypted in the database.
  You need these to let users connect their accounts (e.g. "Connect with Google").
</p>

<div id="provider-cards"></div>

<style>
  .provider-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.75rem;
    margin-bottom: 1.25rem;
  }
  .provider-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }
  .provider-identity {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .provider-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 700;
    color: white;
  }
  .provider-icon.google { background: #4285f4; }
  .provider-icon.github { background: #333; }
  .provider-icon.discord { background: #5865f2; }
  .provider-name {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text);
  }
  .provider-meta {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 0.15rem;
  }
  .provider-actions {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .callback-url-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem 0.9rem;
    font-family: monospace;
    font-size: 0.85rem;
    color: var(--text-muted);
    word-break: break-all;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
  }
  .callback-url-box span { flex: 1; }
  .copy-btn {
    background: var(--surface2);
    border: none;
    border-radius: 4px;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.75rem;
    padding: 0.25rem 0.6rem;
    white-space: nowrap;
  }
  .copy-btn:hover { color: var(--text); }

  .instructions-toggle {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 0.85rem;
    padding: 0;
    margin-bottom: 0.75rem;
    text-decoration: underline;
  }
  .instructions-body {
    display: none;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 1rem;
    margin-bottom: 1rem;
    font-size: 0.875rem;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .instructions-body.open { display: block; }
  .instructions-body ol, .instructions-body ul {
    margin-left: 1.25rem;
    margin-top: 0.5rem;
  }
  .instructions-body li { margin-bottom: 0.35rem; }
  .instructions-body a { color: var(--accent); }

  .cred-form {
    display: none;
  }
  .cred-form.open {
    display: block;
  }
  .cred-form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  @media (max-width: 600px) {
    .cred-form-row { grid-template-columns: 1fr; }
  }
  .cred-actions {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }
  .save-msg {
    font-size: 0.85rem;
    margin-left: 0.5rem;
  }
  .save-msg.ok { color: var(--success); }
  .save-msg.fail { color: var(--danger); }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--text); }
</style>

<script>
  var BASE_URL = "{{base_url}}";
  var PROVIDERS_DATA = {{providers_json}};

  var PROVIDER_META = {
    google: {
      label: "Google",
      iconClass: "google",
      iconText: "G",
      docsUrl: "https://console.cloud.google.com/apis/credentials",
      instructions: function(baseUrl) {
        var cb = baseUrl + "/oauth/google/callback";
        return '<ol>'
          + '<li>Go to <a href="https://console.cloud.google.com/apis/credentials" target="_blank" rel="noopener">Google Cloud Console &rarr; Credentials</a></li>'
          + '<li>Click <strong>Create Credentials &rarr; OAuth client ID</strong></li>'
          + '<li>Choose <strong>Web application</strong> as the application type</li>'
          + '<li>Under <strong>Authorised redirect URIs</strong>, add the callback URL shown above</li>'
          + '<li>Click <strong>Create</strong> and copy the <strong>Client ID</strong> and <strong>Client Secret</strong></li>'
          + '</ol>';
      }
    },
    github: {
      label: "GitHub",
      iconClass: "github",
      iconText: "GH",
      docsUrl: "https://github.com/settings/developers",
      instructions: function(baseUrl) {
        var cb = baseUrl + "/oauth/github/callback";
        return '<ol>'
          + '<li>Go to <a href="https://github.com/settings/applications/new" target="_blank" rel="noopener">GitHub &rarr; Settings &rarr; Developer settings &rarr; New OAuth App</a></li>'
          + '<li>Set <strong>Homepage URL</strong> to <code>' + escHtml(baseUrl) + '</code></li>'
          + '<li>Set <strong>Authorization callback URL</strong> to the callback URL shown above</li>'
          + '<li>Click <strong>Register application</strong></li>'
          + '<li>Copy the <strong>Client ID</strong> and generate a <strong>Client Secret</strong></li>'
          + '</ol>';
      }
    },
    discord: {
      label: "Discord",
      iconClass: "discord",
      iconText: "DC",
      docsUrl: "https://discord.com/developers/applications",
      instructions: function(baseUrl) {
        var cb = baseUrl + "/oauth/discord/callback";
        return '<ol>'
          + '<li>Go to <a href="https://discord.com/developers/applications" target="_blank" rel="noopener">Discord Developer Portal</a></li>'
          + '<li>Click <strong>New Application</strong> and give it a name</li>'
          + '<li>Go to <strong>OAuth2</strong> in the left sidebar</li>'
          + '<li>Under <strong>Redirects</strong>, add the callback URL shown above</li>'
          + '<li>Copy the <strong>Client ID</strong> from the General Information page</li>'
          + '<li>Click <strong>Reset Secret</strong> to generate a <strong>Client Secret</strong></li>'
          + '</ol>';
      }
    }
  };

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function getCsrfToken() {
    var match = document.cookie.match(/(?:^|;\s*)aionima_csrf=([^;]*)/);
    return match ? match[1] : "";
  }

  function callbackUrl(providerId) {
    return BASE_URL + "/oauth/" + providerId + "/callback";
  }

  function toggleInstructions(providerId) {
    var el = document.getElementById("instr-" + providerId);
    if (el) el.classList.toggle("open");
  }

  function toggleForm(providerId) {
    var el = document.getElementById("form-" + providerId);
    if (el) el.classList.toggle("open");
  }

  function copyToClipboard(text, btnId) {
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.getElementById(btnId);
      if (btn) {
        var orig = btn.textContent;
        btn.textContent = "Copied!";
        setTimeout(function() { btn.textContent = orig; }, 1500);
      }
    });
  }

  function saveProvider(providerId) {
    var clientId = document.getElementById("cid-" + providerId).value.trim();
    var clientSecret = document.getElementById("csec-" + providerId).value.trim();
    var msgEl = document.getElementById("msg-" + providerId);
    var saveBtn = document.getElementById("savebtn-" + providerId);

    if (!clientId || !clientSecret) {
      msgEl.className = "save-msg fail";
      msgEl.textContent = "Both Client ID and Client Secret are required.";
      return;
    }

    saveBtn.disabled = true;
    saveBtn.textContent = "Saving...";
    msgEl.textContent = "";
    msgEl.className = "save-msg";

    fetch("/api/settings/providers/" + providerId, {
      method: "POST",
      credentials: "same-origin",
      headers: {
        "Content-Type": "application/json",
        "X-CSRF-Token": getCsrfToken()
      },
      body: JSON.stringify({ clientId: clientId, clientSecret: clientSecret })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.ok) {
        msgEl.className = "save-msg ok";
        msgEl.textContent = "Saved successfully.";
        saveBtn.disabled = false;
        saveBtn.textContent = "Save";
        // Refresh page to show updated status
        setTimeout(function() { window.location.reload(); }, 800);
      } else {
        msgEl.className = "save-msg fail";
        msgEl.textContent = data.error || "Failed to save.";
        saveBtn.disabled = false;
        saveBtn.textContent = "Save";
      }
    })
    .catch(function() {
      msgEl.className = "save-msg fail";
      msgEl.textContent = "Network error. Please try again.";
      saveBtn.disabled = false;
      saveBtn.textContent = "Save";
    });
  }

  function removeProvider(providerId) {
    if (!confirm("Remove credentials for " + providerId + "? This will disable OAuth for this provider.")) {
      return;
    }

    fetch("/api/settings/providers/" + providerId, {
      method: "DELETE",
      credentials: "same-origin",
      headers: { "X-CSRF-Token": getCsrfToken() }
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      if (data.ok) {
        window.location.reload();
      } else {
        alert(data.error || "Failed to remove credentials.");
      }
    })
    .catch(function() {
      alert("Network error. Please try again.");
    });
  }

  function renderCards() {
    var container = document.getElementById("provider-cards");
    container.innerHTML = "";

    PROVIDERS_DATA.forEach(function(p) {
      var meta = PROVIDER_META[p.id];
      if (!meta) return;

      var cb = callbackUrl(p.id);
      var cbId = "cb-btn-" + p.id;

      var statusBadge = p.configured
        ? '<span class="badge badge-connected">Configured</span>'
        : '<span class="badge badge-disconnected">Not configured</span>';

      var metaText = p.configured
        ? "Client ID: " + escHtml(p.clientIdPreview || "") + (p.configuredAt ? " &mdash; saved " + new Date(p.configuredAt).toLocaleDateString() : "")
        : "Enter credentials to enable OAuth for this provider.";

      var actionButtons = p.configured
        ? '<button class="btn btn-sm btn-secondary" onclick="toggleForm(\'' + p.id + '\')">Edit</button>'
          + ' <button class="btn btn-sm btn-danger" onclick="removeProvider(\'' + p.id + '\')">Remove</button>'
        : '<button class="btn btn-sm btn-primary" onclick="toggleForm(\'' + p.id + '\')">Configure</button>';

      var formOpenClass = p.configured ? "" : " open";

      var card = document.createElement("div");
      card.className = "provider-card";
      card.innerHTML =
        '<div class="provider-card-header">'
          + '<div class="provider-identity">'
            + '<div class="provider-icon ' + escHtml(meta.iconClass) + '">' + escHtml(meta.iconText) + '</div>'
            + '<div>'
              + '<div class="provider-name">' + escHtml(meta.label) + '</div>'
              + '<div class="provider-meta">' + metaText + '</div>'
            + '</div>'
          + '</div>'
          + '<div class="provider-actions">'
            + statusBadge
            + ' ' + actionButtons
          + '</div>'
        + '</div>'

        + '<div style="margin-bottom:0.6rem;">'
          + '<div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:0.4rem;">Callback URL &mdash; add this in the provider console:</div>'
          + '<div class="callback-url-box">'
            + '<span>' + escHtml(cb) + '</span>'
            + '<button id="' + escHtml(cbId) + '" class="copy-btn" onclick="copyToClipboard(\'' + escHtml(cb) + '\', \'' + escHtml(cbId) + '\')">Copy</button>'
          + '</div>'
        + '</div>'

        + '<button class="instructions-toggle" onclick="toggleInstructions(\'' + p.id + '\')">'
          + 'Show setup instructions'
        + '</button>'
        + '<div id="instr-' + escHtml(p.id) + '" class="instructions-body">'
          + meta.instructions(BASE_URL)
        + '</div>'

        + '<div id="form-' + escHtml(p.id) + '" class="cred-form' + formOpenClass + '">'
          + '<div class="cred-form-row">'
            + '<div class="form-group">'
              + '<label for="cid-' + escHtml(p.id) + '">Client ID</label>'
              + '<input id="cid-' + escHtml(p.id) + '" type="text" placeholder="Paste client ID here" autocomplete="off" />'
            + '</div>'
            + '<div class="form-group">'
              + '<label for="csec-' + escHtml(p.id) + '">Client Secret</label>'
              + '<input id="csec-' + escHtml(p.id) + '" type="password" placeholder="Paste client secret here" autocomplete="new-password" />'
            + '</div>'
          + '</div>'
          + '<div class="cred-actions">'
            + '<button id="savebtn-' + escHtml(p.id) + '" class="btn btn-primary btn-sm" onclick="saveProvider(\'' + p.id + '\')">Save</button>'
            + '<button class="btn btn-secondary btn-sm" onclick="toggleForm(\'' + p.id + '\')">Cancel</button>'
            + '<span id="msg-' + escHtml(p.id) + '" class="save-msg"></span>'
          + '</div>'
        + '</div>';

      container.appendChild(card);
    });
  }

  renderCards();
</script>
